{% extends 'base.html' %}

{% block title %}Login — Glowbell{% endblock %}

{% block content %}
  <div class="auth-shell">
    <section class="auth-card">
      <h1>Login</h1>
      <p>Access the city explorer and start searching cities.</p>
      <form action="{{ url_for('login_post') }}" method="post">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Enter username" required />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter password" required />

        <button type="submit">Sign In</button>
      </form>
      <p class="auth-secondary">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
      <p class="auth-note">Try <strong>demo / demo123</strong> to log in instantly.</p>
    </section>
  </div>
{% endblock %}
