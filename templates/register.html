{% extends 'base.html' %}

{% block title %}Register — Glowbell{% endblock %}

{% block content %}
  <div class="auth-shell">
    <section class="auth-card">
      <h1>Create an account</h1>
      <p>Register to save your session and access the city explorer.</p>
      <form action="{{ url_for('register') }}" method="post">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Choose a username" required />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Create a password" required />

        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm password" required />

        <button type="submit">Register</button>
      </form>
      <p class="auth-secondary">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </section>
  </div>
{% endblock %}
